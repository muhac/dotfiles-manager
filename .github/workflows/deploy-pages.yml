name: Deploy install.sh to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Generate install.sh
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          mkdir -p _site
          cat > _site/install.sh << EOF
          #!/bin/bash
          set -e

          REPO_URL="${REPO_URL}"
          CLONE_DIR="\$HOME/.dotfiles"

          command -v git >/dev/null 2>&1 || { echo >&2 "git is required but not installed."; exit 1; }

          if [ -d "\$CLONE_DIR/.git" ]; then
            echo "Repo already exists at \$CLONE_DIR, pulling latest..."
            git -C "\$CLONE_DIR" pull --recurse-submodules
          else
            echo "Cloning \$REPO_URL into \$CLONE_DIR..."
            git clone --recurse-submodules "\$REPO_URL" "\$CLONE_DIR"
          fi

          echo "Running symlink.sh..."
          bash "\$CLONE_DIR/symlink.sh"
          EOF
          chmod +x _site/install.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
