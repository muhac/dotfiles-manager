name: Test install.sh

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install.sh
        env:
          REPO_URL: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.clone_url || format('{0}/{1}', github.server_url, github.repository) }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: bash install.sh

      - name: Verify symlinks
        run: |
          FAILED=0
          check() {
            if [ -L "$1" ]; then
              echo "OK  $1"
            else
              echo "MISSING  $1"
              FAILED=1
            fi
          }

          # zsh
          check "$HOME/.zshrc"
          check "$HOME/.zshenv"
          check "$HOME/.zprofile"
          check "$HOME/.p10k.zsh"
          check "$HOME/.condarc"
          check "$HOME/.config/starship.toml"

          # vim
          check "$HOME/.vimrc"
          check "$HOME/.ideavimrc"
          check "$HOME/.config/nvim"

          # nano
          check "$HOME/.nanorc"

          # ghostty
          check "$HOME/.config/ghostty"

          # git is skipped (runner username is not muhan)

          [ "$FAILED" -eq 0 ] || exit 1
