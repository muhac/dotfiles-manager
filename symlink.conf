# Symlink configuration — maps source paths to targets under $HOME.
#
#   <source> [<tab> dest] [<tab> flags]
#
# Source is relative to dotfiles/. Relative = source minus first component.
# Dest overrides ~/ as link root. Omit for default (~/).
# Flags are key:value tokens (e.g. flag:skip-existing).
# Fields are separated by tabs.
#
# Files: linked individually, parent dirs created automatically.
# Directories: linked as a whole symlink. Trailing / is convention, not enforced.
# Glob *: expands to all files in the directory (single level, no directories).
#
# Flags:
#   flag:skip-existing  — skip if target already exists (not a symlink)
#
# Examples:
#   zsh/.zshrc                        → ~/.zshrc
#   zsh/.oh-my-zsh/                   → ~/.oh-my-zsh
#   zsh/*                             → all files in zsh/
#   zsh/.config/starship.toml         → ~/.config/starship.toml
#   some/app.conf	/etc/myapp        → /etc/myapp/app.conf

# cmux
cmux/.config/cmux/settings.json
cmux/.config/ghostty/config

# git
git/.gitconfig	flag:skip-existing

# nano
nano/*

# vim
vim/*
vim/.vim/
vim/.config/nvim/init.vim

# zsh
zsh/*
zsh/.oh-my-zsh/
zsh/.oh-my-zsh-custom/
zsh/.config/starship.toml
